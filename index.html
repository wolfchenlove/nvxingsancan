"菌菇豆腐汤+凉拌菠菜+紫薯","瘦牛肉炒菠菜+蒜蓉油麦菜","鸡蛋炒冬瓜+凉拌黄瓜+玉米",
"鸡胸肉炒西兰花+冬瓜汤","清炒瘦猪肉+清炒娃娃菜+小米粥","蔬菜鸡胸汤+凉拌生菜",
"豆腐炒菌菇+凉拌菠菜+红薯小块","瘦牛肉炒豆芽+蒜蓉油麦菜","鸡蛋炒木耳+凉拌黄瓜+玉米",

snack: [

"黄瓜1根","小番茄10颗","水煮蛋1个","蒸南瓜小块",
"纯牛奶150ml","猕猴桃1个","梨半个","橙子1个",
"无糖豆浆150ml","紫薯小块","玉米半根","原味巴旦木5颗",

"蒸山药小块","无糖椰汁少量","红枣2颗","原味核桃2颗"
]
};

// 规则文案
const rules = {
daily: "🍚 日常餐｜均衡营养｜家常好做｜不重样",
maternity: "🍼 月子餐｜分阶段调理｜下奶补气血｜易消化",
fit: "🥗 减脂餐｜高蛋白｜低GI｜少油盐｜全年龄通用"
};

let current = daily;

// 渲染整月
function renderAll() {
  let html = "";
  for (let i=0;i<30;i++) {
    html+=`
    <tr>
      <td>第${i+1}天</td>
      <td class="t-bf">${current.breakfast[i]}</td>
      <td class="t-lu">${current.lunch[i]}</td>
      <td class="t-din">${current.dinner[i]}</td>
      <td class="t-sn">${current.snack[i]}</td>
    </tr>`;
  }
  document.getElementById("mealBody").innerHTML = html;
  document.getElementById("recBox").style.display = "none";
}

// 随机3个
function random3(arr) {
  let temp = [...arr];
  let res = [];
  for(let i=0;i<3;i++){
    let idx = Math.floor(Math.random()*temp.length);
    res.push(temp.splice(idx,1)[0]);
  }
  return res;
}

// 展示推荐
function showRec(title,list){
  document.getElementById("recBox").style.display = "block";
  document.getElementById("recTitle").innerText = title;
  let items = random3(list);
  let html = "";
  items.forEach((it,i)=>{
    html+=`<div class="rec-item">${i+1}. ${it}</div>`;
  });
  document.getElementById("recList").innerHTML = html;
}

// 复制
document.getElementById("copy").onclick = function(){
  let name = current===daily?"日常餐":current===maternity?"月子餐":"减脂餐";
  let txt = `📅 30天${name}\n${rules[name]}\n\n`;
  document.querySelectorAll("#mealBody tr").forEach(tr=>{
    let t = tr.querySelectorAll("td");
    txt+=`${t[0].innerText}｜早餐：${t[1].innerText}｜午餐：${t[2].innerText}｜晚餐：${t[3].innerText}｜加餐：${t[4].innerText}\n`;
  });
  navigator.clipboard.writeText(txt).then(()=>alert("✅ 复制成功！"));
};

// 切换模式
document.querySelectorAll(".mode-group button").forEach(btn=>{
  btn.onclick = function(){
    document.querySelectorAll(".mode-group button").forEach(b=>b.classList.remove("active"));
    this.classList.add("active");
    let m = this.dataset.mode;
    current = m==="daily"?daily:m==="maternity"?maternity:fit;
    document.getElementById("ruleBox").innerText = rules[m];
    document.getElementById("ruleBox").style.display = "block";
    renderAll();
  };
});

// 绑定按钮
document.getElementById("generate").onclick = renderAll;
document.getElementById("rBf").onclick = ()=>showRec("早餐推荐",current.breakfast);
document.getElementById("rLu").onclick = ()=>showRec("午餐推荐",current.lunch);
document.getElementById("rDin").onclick = ()=>showRec("晚餐推荐",current.dinner);

window.onload = renderAll;
</script>
